<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Log in — GymCoach Studio</title>
  <meta name="description" content="Sign in to your gym's coaching dashboard." />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <main class="flex min-h-screen items-center justify-center px-4">
    <div class="w-full max-w-md rounded-xl border border-slate-200 bg-white shadow-sm">
      <div class="space-y-2 text-center p-6 pb-2">
        <h1 class="text-2xl font-semibold">Welcome back</h1>
        <p class="text-sm text-slate-600">Log in to your gym's coaching dashboard</p>
      </div>
      <div class="p-6 pt-4">
        <form id="login-form" class="space-y-4">
          <div class="space-y-2">
            <label for="email" class="text-sm font-medium">Email</label>
            <input id="email" name="email" type="email" required autocomplete="email"
                   placeholder="you@example.com"
                   class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-slate-900 focus:outline-none" />
          </div>
          <div class="space-y-2">
            <label for="password" class="text-sm font-medium">Password</label>
            <input id="password" name="password" type="password" required minlength="6" autocomplete="current-password"
                   placeholder="••••••••"
                   class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-slate-900 focus:outline-none" />
          </div>
          <button type="submit"
                  class="w-full rounded-md bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-800">
            Log in
          </button>
          <p class="text-center text-sm text-slate-600">
            <a href="index.html" class="hover:text-slate-900">Back home</a>
          </p>
        </form>
      </div>
    </div>
  </main>

  <script>
    document.getElementById('login-form').addEventListener('submit', function (e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      localStorage.setItem('demo-user-email', email);
      // redirect to your backend prompt generator
      window.location.href = '/prompt-generator';
    });
  </script>
</body>
</html>
